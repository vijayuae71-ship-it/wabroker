version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: wabroker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: wabroker_secure_2024
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:wabroker_secure_2024@postgres:5432/wabroker
    ports:
      - "3000:3000"
    command: sh -c "npm run migrate && npm start"

  dashboard:
    build: ./dashboard
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
