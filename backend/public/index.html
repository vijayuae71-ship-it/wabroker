<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Layla — Dubai AI Property Consultant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Inter',sans-serif;background:#EDEAE4;overflow:hidden}
:root{--navy:#0D1B2A;--gold:#C9A84C;--gold-light:#E8C96A;--ivory:#F7F4EE;--white:#FFFFFF;--gray:#8A8A8A;--green:#22C55E}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--ivory);box-shadow:0 0 40px rgba(0,0,0,.15)}

/* ── HEADER ── */
header{background:var(--navy);padding:14px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;position:relative;z-index:10}
.avatar-wrap{position:relative;flex-shrink:0}
.layla-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#9B6E1A);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:white;letter-spacing:-1px}
.status-dot{position:absolute;bottom:2px;right:2px;width:10px;height:10px;background:var(--green);border-radius:50%;border:2px solid var(--navy)}
.header-info{flex:1}
.header-name{color:white;font-size:16px;font-weight:700;letter-spacing:.3px}
.header-sub{color:rgba(255,255,255,.55);font-size:11px;margin-top:1px}
.header-badge{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);color:var(--gold);font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;letter-spacing:.5px}

/* ── CHAT ── */
#chat{flex:1;overflow-y:auto;padding:18px 14px 10px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
#chat::-webkit-scrollbar{width:0}

/* ── MESSAGES ── */
.msg-row{display:flex;gap:8px;animation:fadeUp .3s ease forwards;opacity:0}
.msg-row.user{flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#9B6E1A);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;flex-shrink:0;margin-top:2px}
.bubble{max-width:82%;padding:11px 14px;border-radius:18px;font-size:14px;line-height:1.55;word-break:break-word}
.bubble.layla{background:white;color:#1a1a2e;border-bottom-left-radius:4px;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.bubble.user{background:var(--navy);color:white;border-bottom-right-radius:4px}

/* ── PROPERTY CARDS ── */
.cards-wrap{display:flex;flex-direction:column;gap:12px;width:100%;margin-left:38px}
.prop-card{background:white;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);cursor:pointer;transition:transform .2s,box-shadow .2s;animation:fadeUp .4s ease forwards;opacity:0}
.prop-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.card-img{position:relative;height:160px;overflow:hidden;background:#e0ddd8}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.prop-card:hover .card-img img{transform:scale(1.03)}
.card-img-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(13,27,42,.85));padding:10px 12px 8px}
.card-price{color:white;font-size:18px;font-weight:700;line-height:1}
.card-price-sub{color:rgba(255,255,255,.75);font-size:11px;margin-top:2px}
.card-badges{position:absolute;top:10px;left:10px;display:flex;gap:5px;flex-wrap:wrap}
.badge{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.3px}
.badge-featured{background:var(--gold);color:#0D1B2A}
.badge-visa{background:#7C3AED;color:white}
.badge-offplan{background:#0EA5E9;color:white}
.badge-hot{background:#EF4444;color:white}
.badge-new{background:var(--green);color:white}
.badge-yield{background:rgba(34,197,94,.9);color:white}
.card-body{padding:12px}
.card-title{font-size:13px;font-weight:600;color:#1a1a2e;margin-bottom:6px;line-height:1.3}
.card-area{font-size:11px;color:var(--gray);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.card-stats{display:flex;gap:0;margin-bottom:10px;background:#F7F4EE;border-radius:8px;overflow:hidden}
.stat{flex:1;padding:6px 4px;text-align:center;font-size:11px;color:#444}
.stat span{display:block;font-size:13px;font-weight:600;color:var(--navy)}
.stat+.stat{border-left:1px solid #e8e4dc}
.card-amenities{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.amenity{background:#F0EDE8;color:#555;font-size:10px;padding:3px 7px;border-radius:12px}
.card-footer{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-book{background:var(--navy);color:white;border:none;border-radius:10px;padding:9px;font-size:12px;font-weight:600;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-book:hover{background:#1a3040}
.btn-calc{background:transparent;color:var(--navy);border:1.5px solid var(--navy);border-radius:10px;padding:9px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-calc:hover{background:var(--navy);color:white}
.negotiate-tag{background:#FFF7ED;border:1px solid #FED7AA;color:#C2410C;font-size:10px;padding:4px 8px;border-radius:6px;display:flex;align-items:center;gap:4px;margin-bottom:8px}

/* ── QUICK REPLIES ── */
.quick-replies{display:flex;gap:8px;flex-wrap:wrap;margin-left:38px;margin-top:-4px}
.qr{background:white;border:1.5px solid #ddd;color:var(--navy);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.qr:hover,.qr:active{background:var(--navy);color:white;border-color:var(--navy)}

/* ── TYPING ── */
.typing-row{display:flex;gap:8px;align-items:flex-end}
.typing-bubble{background:white;border-radius:18px;border-bottom-left-radius:4px;padding:12px 16px;box-shadow:0 1px 8px rgba(0,0,0,.06);display:flex;gap:5px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:#C9A84C;animation:bounce .9s infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}

/* ── INPUT ── */
.input-area{background:white;border-top:1px solid #e8e4dc;padding:10px 12px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
#msg-input{flex:1;border:1.5px solid #e0ddd8;border-radius:22px;padding:10px 16px;font-size:14px;font-family:'Inter',sans-serif;resize:none;outline:none;max-height:120px;background:#FAFAF8;color:#1a1a2e;transition:border-color .2s;line-height:1.4}
#msg-input:focus{border-color:var(--gold)}
#msg-input::placeholder{color:#B0ACA5}
#send-btn{width:42px;height:42px;background:var(--navy);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .15s}
#send-btn:hover{background:#1a3040}
#send-btn:active{transform:scale(.92)}
#send-btn svg{width:18px;height:18px;fill:white}

/* ── MODAL OVERLAY ── */
.modal-overlay{position:fixed;inset:0;background:rgba(13,27,42,.6);z-index:50;display:flex;align-items:flex-end;justify-content:center;opacity:0;visibility:hidden;transition:all .3s;backdrop-filter:blur(4px)}
.modal-overlay.open{opacity:1;visibility:visible}
.modal-sheet{background:white;border-radius:22px 22px 0 0;width:100%;max-width:480px;padding:20px;transform:translateY(40px);transition:transform .3s ease;max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:4px}
.modal-prop{font-size:12px;color:var(--gray);margin-bottom:18px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;font-weight:600;color:#444;margin-bottom:5px}
.form-row input,.form-row select{width:100%;border:1.5px solid #e0ddd8;border-radius:10px;padding:11px 14px;font-size:14px;font-family:'Inter',sans-serif;outline:none;color:#1a1a2e;background:#FAFAF8;transition:border-color .2s}
.form-row input:focus,.form-row select:focus{border-color:var(--gold)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-submit{width:100%;background:var(--navy);color:white;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .2s}
.btn-submit:hover{background:#1a3040}
.btn-cancel{width:100%;background:transparent;color:var(--gray);border:none;padding:10px;font-size:13px;cursor:pointer;margin-top:4px}

/* ── CALC MODAL ── */
.calc-result{background:linear-gradient(135deg,var(--navy),#1a3040);border-radius:14px;padding:16px;margin-top:14px;color:white}
.calc-result h3{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:8px}
.calc-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.calc-row:last-child{border:none;margin-top:4px}
.calc-row .label{font-size:12px;color:rgba(255,255,255,.7)}
.calc-row .value{font-size:14px;font-weight:700;color:white}
.calc-monthly{text-align:center;margin-top:10px;font-size:22px;font-weight:800;color:var(--gold-light)}
.calc-monthly span{display:block;font-size:11px;font-weight:400;color:rgba(255,255,255,.6);margin-bottom:2px}
.range-row{margin-bottom:14px}
.range-row label{display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:#444;margin-bottom:5px}
.range-row label span{color:var(--gold);font-weight:700}
input[type=range]{width:100%;accent-color:var(--gold);cursor:pointer}

/* ── MORTGAGE BANNER (inline in card) ── */
.calc-inline{background:#F0EDE8;border-radius:10px;padding:10px 12px;font-size:12px;color:#555;margin-top:8px;display:none}

/* ── SUCCESS ── */
.success-msg{background:#F0FDF4;border:1px solid #BBF7D0;color:#15803D;border-radius:12px;padding:14px;font-size:13px;font-weight:500;text-align:center;margin-top:10px}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,80%,100%{transform:scale(0.8)}40%{transform:scale(1.2)}}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="avatar-wrap">
      <div class="layla-avatar">L</div>
      <div class="status-dot"></div>
    </div>
    <div class="header-info">
      <div class="header-name">Layla</div>
      <div class="header-sub">Dubai AI Property Expert · Typically replies instantly</div>
    </div>
    <div class="header-badge">LIVE AI</div>
  </header>

  <!-- CHAT -->
  <div id="chat"></div>

  <!-- INPUT -->
  <div class="input-area">
    <textarea id="msg-input" rows="1" placeholder="Ask Layla anything about Dubai property…"></textarea>
    <button id="send-btn" onclick="handleSend()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<!-- BOOKING MODAL -->
<div class="modal-overlay" id="booking-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">📅 Book a Viewing</div>
    <div class="modal-prop" id="modal-prop-name"></div>
    <div class="form-row">
      <label>Your Name</label>
      <input id="b-name" type="text" placeholder="e.g. Ahmed Al Mansoori">
    </div>
    <div class="form-row">
      <label>WhatsApp / Phone</label>
      <input id="b-phone" type="tel" placeholder="+971 50 000 0000">
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>Preferred Date</label>
        <input id="b-date" type="date">
      </div>
      <div class="form-row">
        <label>Preferred Time</label>
        <select id="b-time">
          <option>9:00 AM</option><option>10:00 AM</option><option>11:00 AM</option>
          <option>12:00 PM</option><option>2:00 PM</option><option>3:00 PM</option>
          <option>4:00 PM</option><option>5:00 PM</option><option>6:00 PM</option>
        </select>
      </div>
    </div>
    <div id="booking-success"></div>
    <button class="btn-submit" onclick="submitBooking()">Confirm Viewing ✓</button>
    <button class="btn-cancel" onclick="closeModal('booking-modal')">Cancel</button>
  </div>
</div>

<!-- MORTGAGE MODAL -->
<div class="modal-overlay" id="calc-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">🧮 Mortgage Calculator</div>
    <div class="modal-prop" id="calc-prop-name"></div>
    <div class="range-row">
      <label>Down Payment <span id="dp-label">25%</span></label>
      <input type="range" id="dp-slider" min="20" max="50" value="25" oninput="updateCalc()">
    </div>
    <div class="range-row">
      <label>Interest Rate <span id="rate-label">4.99%</span></label>
      <input type="range" id="rate-slider" min="3" max="8" value="4.99" step="0.25" oninput="updateCalc()">
    </div>
    <div class="range-row">
      <label>Loan Term <span id="term-label">25 years</span></label>
      <input type="range" id="term-slider" min="5" max="25" value="25" oninput="updateCalc()">
    </div>
    <div class="calc-result" id="calc-result"></div>
    <button class="btn-cancel" onclick="closeModal('calc-modal')" style="margin-top:14px">Close</button>
  </div>
</div>

<script>
'use strict';
const API = '/api/webchat/message';
const BOOK_API = '/api/bookings';
let history = [];
let currentBooking = null;
let calcPrice = 0;

// ── INIT GREETING ──
window.addEventListener('DOMContentLoaded', () => {
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  document.getElementById('b-date').value = tomorrow.toISOString().split('T')[0];
  setTimeout(() => {
    addMsg('layla', "Hey there! 👋 I'm **Layla** — your personal Dubai property expert.\n\nI've helped hundreds of clients find their perfect home here, from JVC studios to Palm villas. Tell me what you're looking for and I'll find you something amazing! 🏙️", [], true);
    setTimeout(() => addQuickReplies(['🏠 I want to Buy', '🔑 Looking to Rent', '📈 Investment Property', '🏗️ Off-Plan Only']), 400);
  }, 300);
  autoResize();
});

// ── SEND ──
function handleSend() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  autoResize();
  sendMessage(text);
}

document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});

async function sendMessage(text) {
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: history.slice(-12) })
    });
    const data = await res.json();
    hideTyping();
    const reply = data.message || "I'm here to help — tell me what you're looking for!";
    history.push({ role: 'assistant', content: reply });
    addMsg('layla', reply, data.properties || []);
  } catch (err) {
    hideTyping();
    addMsg('layla', "Oops, I had a moment there! 🙈 Please try again.");
  }
}

// ── RENDER MESSAGE ──
function addMsg(role, text, properties = [], isGreeting = false) {
  const chat = document.getElementById('chat');
  const isLayla = role === 'layla';

  const row = document.createElement('div');
  row.className = 'msg-row' + (isLayla ? '' : ' user');

  if (isLayla) {
    row.innerHTML = `<div class="msg-avatar">L</div><div></div>`;
    const wrap = row.children[1];
    const bubble = document.createElement('div');
    bubble.className = 'bubble layla';
    bubble.innerHTML = formatText(text);
    wrap.appendChild(bubble);

    // Property cards
    if (properties && properties.length > 0) {
      const cardsWrap = document.createElement('div');
      cardsWrap.className = 'cards-wrap';
      properties.forEach((p, i) => {
        const card = buildCard(p, i);
        cardsWrap.appendChild(card);
      });
      chat.appendChild(row);
      chat.appendChild(cardsWrap);
      scrollChat();
      return;
    }
  } else {
    row.innerHTML = `<div class="bubble user">${escHtml(text)}</div>`;
  }

  chat.appendChild(row);
  scrollChat();
}

function addQuickReplies(options) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'quick-replies';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr';
    btn.textContent = opt;
    btn.onclick = () => { wrap.remove(); sendMessage(opt); };
    wrap.appendChild(btn);
  });
  chat.appendChild(wrap);
  scrollChat();
}

// ── PROPERTY CARD ──
function buildCard(p, idx) {
  const card = document.createElement('div');
  card.className = 'prop-card';
  card.style.animationDelay = `${idx * 0.1}s`;

  const photo = p.photo_urls && p.photo_urls[0] ? p.photo_urls[0] : 'https://images.unsplash.com/photo-1486325212027-8081e485255e?w=800&q=80';
  const isSale = p.listing_type === 'sale';
  const priceStr = isSale ? 'AED ' + fmt(p.price) : 'AED ' + fmt(p.price) + '/yr';
  const sqftPrice = p.price_per_sqft ? ` · AED ${fmt(Math.round(p.price_per_sqft))}/sqft` : '';
  const beds = p.bedrooms === 'studio' ? 'Studio' : p.bedrooms + ' BR';
  const floor = p.floor ? `Floor ${p.floor}${p.total_floors ? '/' + p.total_floors : ''}` : '';
  const amenities = (p.amenities || []).slice(0, 3);
  const isHot = p.days_on_market > 45;
  const isNew = p.days_on_market <= 5;
  const canNegotiate = p.days_on_market > 30;
  const yieldStr = p.gross_yield ? `${p.gross_yield}% yield` : '';

  let badges = '';
  if (p.is_featured) badges += `<span class="badge badge-featured">⭐ Featured</span>`;
  if (p.is_off_plan) badges += `<span class="badge badge-offplan">🏗️ Off-Plan</span>`;
  if (p.is_golden_visa_eligible && isSale) badges += `<span class="badge badge-visa">🏆 Golden Visa</span>`;
  if (isNew) badges += `<span class="badge badge-new">🆕 Just Listed</span>`;
  if (isHot && !isNew) badges += `<span class="badge badge-hot">🔥 ${p.days_on_market}d Listed</span>`;
  if (yieldStr && isSale) badges += `<span class="badge badge-yield">📈 ${yieldStr}</span>`;

  const negotiateHtml = canNegotiate && isSale ? `<div class="negotiate-tag">⚡ On market ${p.days_on_market} days — motivated seller, room to negotiate!</div>` : '';
  const amenityHtml = amenities.map(a => `<span class="amenity">${a}</span>`).join('');
  const chequeInfo = p.cheques_accepted > 1 ? `${p.cheques_accepted} cheques` : '1 cheque';
  const viewInfo = p.view ? ` · ${p.view}` : '';
  const offplanHtml = p.is_off_plan && p.payment_plan ? `<div style="background:#EFF6FF;border-radius:8px;padding:6px 10px;font-size:11px;color:#1e40af;margin-bottom:8px">🏗️ ${p.developer || ''} · ${p.payment_plan}</div>` : '';

  card.innerHTML = `
    <div class="card-img">
      <img src="${photo}" alt="${p.title}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1486325212027-8081e485255e?w=800&q=80'">
      <div class="card-badges">${badges}</div>
      <div class="card-img-overlay">
        <div class="card-price">${priceStr}</div>
        <div class="card-price-sub">${sqftPrice}${viewInfo}</div>
      </div>
    </div>
    <div class="card-body">
      <div class="card-title">${p.title}</div>
      <div class="card-area">📍 ${p.area}${p.community ? ' — ' + p.community : ''}</div>
      ${negotiateHtml}
      ${offplanHtml}
      <div class="card-stats">
        <div class="stat"><span>${beds}</span>Beds</div>
        <div class="stat"><span>${p.bathrooms || '—'}</span>Baths</div>
        <div class="stat"><span>${fmt(p.sqft)}</span>sqft</div>
        <div class="stat"><span>${chequeInfo}</span>Payment</div>
      </div>
      <div class="card-amenities">${amenityHtml}</div>
      ${floor ? `<div style="font-size:11px;color:#888;margin-bottom:8px">🏢 ${floor}</div>` : ''}
      <div class="card-footer">
        <button class="btn-book" onclick="openBooking(${JSON.stringify(p).replace(/"/g,'&quot;')})">📅 Book Viewing</button>
        ${isSale ? `<button class="btn-calc" onclick="openCalc(${JSON.stringify(p).replace(/"/g,'&quot;')})">🧮 Mortgage</button>` : `<button class="btn-calc" onclick="sendMessage('Tell me more about ${p.ref_no}')">ℹ️ More Info</button>`}
      </div>
    </div>`;

  return card;
}

// ── BOOKING ──
function openBooking(p) {
  currentBooking = p;
  document.getElementById('modal-prop-name').textContent = p.title + ' · ' + p.area;
  document.getElementById('booking-success').innerHTML = '';
  document.getElementById('booking-modal').classList.add('open');
}

async function submitBooking() {
  const name = document.getElementById('b-name').value.trim();
  const phone = document.getElementById('b-phone').value.trim();
  const date = document.getElementById('b-date').value;
  const time = document.getElementById('b-time').value;
  if (!name || !phone) { alert('Please enter your name and phone number.'); return; }

  try {
    await fetch(BOOK_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, phone, propertyTitle: currentBooking?.title, propertyRef: currentBooking?.ref_no, date, time })
    });
  } catch {}

  document.getElementById('booking-success').innerHTML = `
    <div class="success-msg">✅ Viewing confirmed for <strong>${name}</strong>!<br>
    <strong>${currentBooking?.title}</strong><br>
    ${date} at ${time}<br><br>
    We'll WhatsApp you a confirmation shortly 🎉</div>`;
  document.querySelector('#booking-modal .btn-submit').style.display = 'none';
  
  setTimeout(() => {
    closeModal('booking-modal');
    document.querySelector('#booking-modal .btn-submit').style.display = 'block';
    addMsg('layla', `✅ Perfect! Viewing booked for ${currentBooking?.title} on ${date} at ${time}. I'll make sure the team is ready for you, ${name}! 🏠\n\nAnything else you'd like to know — pricing, the area, or similar properties?`);
    addQuickReplies(['💰 Price negotiable?', '🗺️ About the area', '📊 ROI calculation', '🔍 Show more options']);
  }, 2500);
}

// ── MORTGAGE CALC ──
function openCalc(p) {
  calcPrice = parseFloat(p.price);
  document.getElementById('calc-prop-name').textContent = p.title + ' · AED ' + fmt(calcPrice);
  document.getElementById('calc-modal').classList.add('open');
  updateCalc();
}

function updateCalc() {
  const dp = parseInt(document.getElementById('dp-slider').value);
  const rate = parseFloat(document.getElementById('rate-slider').value);
  const term = parseInt(document.getElementById('term-slider').value);
  document.getElementById('dp-label').textContent = dp + '%';
  document.getElementById('rate-label').textContent = rate.toFixed(2) + '%';
  document.getElementById('term-label').textContent = term + ' years';

  const downPayment = calcPrice * dp / 100;
  const loan = calcPrice - downPayment;
  const monthlyRate = rate / 100 / 12;
  const n = term * 12;
  const monthly = loan * monthlyRate * Math.pow(1 + monthlyRate, n) / (Math.pow(1 + monthlyRate, n) - 1);
  const totalPaid = monthly * n;
  const totalInterest = totalPaid - loan;

  document.getElementById('calc-result').innerHTML = `
    <h3>Mortgage Breakdown</h3>
    <div class="calc-row"><span class="label">Property Price</span><span class="value">AED ${fmt(Math.round(calcPrice))}</span></div>
    <div class="calc-row"><span class="label">Down Payment (${dp}%)</span><span class="value">AED ${fmt(Math.round(downPayment))}</span></div>
    <div class="calc-row"><span class="label">Loan Amount</span><span class="value">AED ${fmt(Math.round(loan))}</span></div>
    <div class="calc-row"><span class="label">Total Interest</span><span class="value">AED ${fmt(Math.round(totalInterest))}</span></div>
    <div class="calc-monthly"><span>Monthly Payment</span>AED ${fmt(Math.round(monthly))}</div>
    <div style="font-size:11px;color:rgba(255,255,255,.5);text-align:center;margin-top:8px">*Indicative. UAE expats: 75% LTV max. No income tax.</div>`;
}

// ── MODAL ──
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ── TYPING ──
let typingEl = null;
function showTyping() {
  const chat = document.getElementById('chat');
  typingEl = document.createElement('div');
  typingEl.className = 'typing-row';
  typingEl.innerHTML = `<div class="msg-avatar">L</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chat.appendChild(typingEl);
  scrollChat();
}
function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

// ── HELPERS ──
function scrollChat() {
  const chat = document.getElementById('chat');
  setTimeout(() => chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' }), 50);
}

function fmt(n) {
  return Number(n).toLocaleString('en-AE');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatText(s) {
  return escHtml(s)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}

function autoResize() {
  const ta = document.getElementById('msg-input');
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}
document.getElementById('msg-input').addEventListener('input', autoResize);
</script>
